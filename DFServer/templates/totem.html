<!DOCTYPE html>
<html>

<head>
    <title>Pantalla Totem</title>

    <!-- Socket.io + jQuery -->
    <script src="../static/js/socket.io.min.js"></script>
    <script src="../static/js/jquery-3.6.0.min.js"></script>

    <script>
        // Socket declarado UNA SOLA VEZ aquí
        const socket = io('http://127.0.0.1:5000');

        $(document).ready(function () {

            console.log('ready');

            // Pantalla inicial
            $('.screen').hide();
            $('#idle').show();

            // Parámetros de Jinja
            $('.gameName').html(`{{ gameName }}`);
            $('.gameUnit').html(`{{ gameUnit }}`);
            $('.playingTitle').html(`{{ playingTitle }}`);
        });

        // ===================================================
        // LISTENER: Botones de nivel (delegado - funciona siempre)
        // ===================================================
        $(document).on('click', '.level-btn', function () {
            const level = parseInt($(this).data('level'));
            console.log("Nivel seleccionado:", level);
            socket.emit('levelSelected', level);
        });

        // ===================================================
        // Cambiar pantalla por Socket.io
        // ===================================================
        socket.on('changeScreen', function (data) {
            console.log('changeScreen', data.screenId)
            $('.screen').hide();
            $('#' + data.screenId).show();
        });

        // Actualizar valores en pantalla
        socket.on('updateParam', function (data) {
            console.log('updateParam', data.paramValue)
            $('.' + data.paramClass).html(data.paramValue);
        });
    </script>

    <link rel="stylesheet" href="../static/styles.css">
</head>

<body style="width: 1008px; height: 750px;">
    {{ screensContent | safe }}
</body>

</html>
