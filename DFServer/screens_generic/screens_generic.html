<div id="idle" class="screen" style="width: 100%; height: 100%; position: relative; background: black; display:none;">
    <!-- Top Bar -->
    <div
        style="width: 90%; height: 2%; left: 5%; top: 8%; position: absolute; background: #E5E5E5; border: 3px #E5E5E5 solid">
    </div>

    <!-- Bottom Bar -->
    <div
        style="width: 90%; height: 2%; left: 5%; bottom: 8%; position: absolute; background: #E5E5E5; border: 3px #E5E5E5 solid">
    </div>

    <!-- Content -->
    <div style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10vh;
    ">
        <div class="gameName"
            style="width: 100%; text-align: center; color: #E5E5E5; font-size: 10vw; font-family: Fugaz One; font-weight: 400; text-transform: uppercase; line-height: 1.2; white-space: nowrap;">
        </div>
        <div
            style="width: 100%; text-align: center; color: #EDE173; font-size: 5vw; font-family: Fugaz One; font-weight: 400; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.50px; word-wrap: break-word">
            acercá el tag para iniciar el desafío
        </div>
    </div>
</div>

<div id="levelSelection" class="screen" style="width: 100%; height: 100%; position: relative; background: black;">
    <div style="
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 700px;
        display: flex;
        flex-direction: column;
        gap: 5vh;
        align-items: center;
    ">
        <div style="
            text-align: center;
            color: #EDE173;
            padding: 8px 0;
            font-size: 5vh;
            font-family: 'Fugaz One';
            text-transform: uppercase;
        ">
            SELECCIONAR NIVEL
        </div>

        <button class="level-btn" data-level="1" style="
            width: 100%;
            padding: 2vh 0;
            font-size: 4vh;
            font-family: 'Fugaz One';
            background: #333;
            color: #EDE173;
            border: 6px solid #EDE173;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
        ">INICIAL</button>

        <button class="level-btn" data-level="2" style="
            width: 100%;
            padding: 2vh 0;
            font-size: 4vh;
            font-family: 'Fugaz One';
            background: #333;
            color: #EDE173;
            border: 6px solid #EDE173;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
        ">INTERMEDIO</button>

        <button class="level-btn" data-level="3" style="
            width: 100%;
            padding: 2vh 0;
            font-size: 4vh;
            font-family: 'Fugaz One';
            background: #333;
            color: #EDE173;
            border: 6px solid #EDE173;
            border-radius: 18px;
            cursor: pointer;
            text-transform: uppercase;
        ">SUPERIOR</button>
    </div>
</div>

<div id="loading" class="screen"
    style="width: 100%; height: 100%; position: relative; background: black; display:none;">
    <!-- Top Bar -->
    <div
        style="width: 90%; height: 2%; left: 5%; top: 8%; position: absolute; background: #E5E5E5; border: 3px #E5E5E5 solid">
    </div>

    <!-- Bottom Bar -->
    <div
        style="width: 90%; height: 2%; left: 5%; bottom: 8%; position: absolute; background: #E5E5E5; border: 3px #E5E5E5 solid">
    </div>

    <div style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10vh;
    ">
        <div
            style="width: 100%; text-align: center; color: white; font-size: 6vw; font-family: Fugaz One; font-weight: 400; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.50px; word-wrap: break-word">
            comienza el desafío en
        </div>
        <div class="countdownTimer"
            style="width: 100%; text-align: center; color: white; font-size: 15vw; font-family: Fugaz One; font-weight: 400; text-transform: uppercase; line-height: 1; word-wrap: break-word">
        </div>
    </div>
</div>
